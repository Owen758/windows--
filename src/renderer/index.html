<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <title>历史粘贴板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 标题栏 -->
    <header id="titlebar">
      <span class="app-title">历史粘贴板</span>
      <div class="titlebar-actions">
        <button id="btn-settings" class="btn-icon" title="设置">⚙️</button>
        <div class="window-controls">
          <button id="btn-minimize" title="最小化">─</button>
          <button id="btn-maximize" title="最大化">□</button>
          <button id="btn-close" title="关闭">✕</button>
        </div>
      </div>
    </header>

    <!-- 搜索栏 -->
    <div id="search-bar">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜索历史记录..." autocomplete="off">
        <button id="btn-clear-search" class="btn-clear" title="清除搜索">✕</button>
      </div>
    </div>

    <!-- 主内容滚动区 -->
    <div id="scroll-container">
      <!-- 置顶区域 -->
      <div id="pinned-section" class="section" style="display: none;">
        <div class="section-header">📌 置顶</div>
        <div id="pinned-list" class="card-list"></div>
      </div>

      <!-- 最近记录区域 -->
      <div id="recent-section" class="section">
        <div class="section-header">🕐 最近记录</div>
        <div id="history-list" class="card-list"></div>
        <div id="load-more" class="load-more" style="display: none;">
          <button id="btn-load-more">加载更多</button>
        </div>
        <div id="empty-state" class="empty-state" style="display: none;">
          <div class="empty-icon">📋</div>
          <p>暂无记录</p>
          <p class="hint">复制一些内容试试吧</p>
        </div>
      </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div id="image-preview" class="modal" style="display: none;">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <img id="preview-image" src="" alt="预览">
        <button id="btn-close-preview" class="btn-close-modal">✕</button>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast" style="display: none;"></div>

    <!-- ========== 设置面板 ========== -->
    <div id="settings-panel" class="settings-overlay" style="display: none;">
      <div id="settings-backdrop" class="settings-backdrop"></div>
      <div class="settings-dialog">
        <div class="settings-header">
          <h2>设置</h2>
          <button id="btn-close-settings" class="btn-close-modal">✕</button>
        </div>

        <div class="settings-body">
          <!-- 常规 -->
          <div class="settings-group">
            <h3>常规</h3>
            <div class="setting-row">
              <span>开机自启</span>
              <label class="toggle">
                <input type="checkbox" id="launchAtStartup" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="setting-row">
              <span>保留天数</span>
              <div class="radio-group">
                <label><input type="radio" name="retainDays" value="1"> 1天</label>
                <label><input type="radio" name="retainDays" value="3" checked> 3天</label>
                <label><input type="radio" name="retainDays" value="5"> 5天</label>
              </div>
            </div>
          </div>

          <!-- 快捷键 -->
          <div class="settings-group">
            <h3>快捷键</h3>
            <div class="setting-row">
              <span>唤出窗口</span>
              <span id="shortcut-display" class="shortcut-key">Ctrl+Shift+V</span>
            </div>
            <p class="setting-hint">点击快捷键后按下新组合键</p>
          </div>

          <!-- 外观 -->
          <div class="settings-group">
            <h3>外观</h3>
            <div class="setting-row">
              <span>主题模式</span>
              <div class="radio-group">
                <label><input type="radio" name="theme" value="light" checked> 浅色</label>
                <label><input type="radio" name="theme" value="dark"> 深色</label>
              </div>
            </div>
            <div class="setting-row">
              <span>主色调</span>
              <div class="color-options">
                <span class="color-swatch active" data-color="#4A90D9" style="background: #4A90D9;" title="天空蓝"></span>
                <span class="color-swatch" data-color="#5C6BC0" style="background: #5C6BC0;" title="靛蓝"></span>
                <span class="color-swatch" data-color="#26A69A" style="background: #26A69A;" title="青绿"></span>
                <span class="color-swatch" data-color="#EF5350" style="background: #EF5350;" title="珊瑚红"></span>
                <span class="color-swatch" data-color="#FF7043" style="background: #FF7043;" title="橙色"></span>
                <span class="color-swatch" data-color="#AB47BC" style="background: #AB47BC;" title="紫色"></span>
                <span class="color-swatch" data-color="#78909C" style="background: #78909C;" title="灰蓝"></span>
                <span class="color-swatch" data-color="#8D6E63" style="background: #8D6E63;" title="棕色"></span>
                <input type="color" id="accent-picker" value="#4A90D9" class="color-picker" title="自定义颜色">
              </div>
            </div>
          </div>

          <!-- 关于 -->
          <div class="settings-group">
            <h3>关于</h3>
            <div class="setting-row">
              <span>版本</span>
              <span class="text-secondary">v0.1.0</span>
            </div>
            <div class="setting-row">
              <span>历史记录总数</span>
              <span class="text-secondary" id="stats-total">—</span>
            </div>
          </div>
        </div>

        <div class="settings-footer">
          <button id="btn-save-settings" class="btn-primary">保存设置</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="settings.js"></script>
</body>
</html>
